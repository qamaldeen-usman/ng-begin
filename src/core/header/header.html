<header>
  <!-- Updated top navigation bar: now fully responsive with Bootstrap navbar -->
  <!-- Hamburger menu appears automatically on mobile (screens smaller than lg breakpoint) -->
  <!-- On desktop (lg+): logo left, nav links right (exact same layout as before) -->
  <!-- On mobile: logo left + hamburger toggler right; clicking opens a clean vertical dropdown menu -->
  <nav class="navbar navbar-expand-lg px-3 py-2 text-bg-dark border-bottom navbar-dark navbg">
    <div class="container">
      <!-- Logo (kept exactly as you had it, now using navbar-brand for proper spacing) -->
      <a class="d-flex align-items-center my-2 my-lg-0 text-white text-decoration-none navbar-brand"
         routerLink="/">
        <div class="text-white fs-1 fw-bold fst-italic">Stainless<span class="text-success">Glass</span></div>
      </a>

      <!-- Hamburger toggler button (only visible on mobile) -->
      <button class="navbar-toggler"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#mainNav"
              aria-controls="mainNav"
              aria-expanded="false"
              aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Collapsible menu (this is what becomes the hamburger dropdown on mobile) -->
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto my-2 my-lg-0 text-small">
          <li class="nav-item">
            <a class="nav-link text-white fw-bold"
               routerLink="/"
               routerLinkActive="active">
              <svg class="bi d-block mx-auto mb-1" width="24" height="24" aria-hidden="true">
                <use href="#house"></use>
              </svg>
              Home
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-white fw-bold"
               routerLink="/about">
              <svg class="bi d-block mx-auto mb-1" width="24" height="24" aria-hidden="true">
                <use href="#speedometer2"></use>
              </svg>
              About
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-white fw-bold"
               routerLink="/orders">
              <svg class="bi d-block mx-auto mb-1" width="24" height="24" aria-hidden="true">
                <use xlink:href="#table"></use>
              </svg>
              Orders
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-white fw-bold"
               routerLink="/services">
              <svg class="bi d-block mx-auto mb-1" width="24" height="24" aria-hidden="true">
                <use xlink:href="#grid"></use>
              </svg>
              Services
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-white fw-bold"
               routerLink="/customers">
              <svg class="bi d-block mx-auto mb-1" width="24" height="24" aria-hidden="true">
                <use xlink:href="#people-circle"></use>
              </svg>
              Customers
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Your original second bar (search + buttons) - left unchanged because it's already responsive -->
  <!-- On mobile it will stack naturally (search full width, buttons below) -->
  <div class="px-3 py-2 border-bottom mb-3">
    <div class="container d-flex flex-wrap justify-content-center">
      <form class="col-12 col-lg-auto mb-2 mb-lg-0 me-lg-auto" role="search">
        <input type="search" class="form-control" placeholder="Search..." aria-label="Search">
      </form>
      <div class="text-end">
        <button type="button" class="btn btn-light text-dark me-2 fw-bold">Login</button>
        <button type="button" class="btn btn-success fw-bold">Sign-up</button>
      </div>
    </div>
  </div>
</header>
