<header class="navbar navbar-expand-lg fixed-top zaks-green">

  <div class="container custom-navbar-container">

    <!-- Logo -->
    <a class="navbar-brand pe-sm-3 d-flex align-items-center"
       routerLink="/">

      <img src="/lglgtrans.svg"
           alt="logo"
           class="logo me-2">

      <span class="text-white">
        ZAKSPRENEUR
      </span>
    </a>

    <!-- Theme switcher -->
    <div class="theme-switcher d-flex align-items-center order-lg-2 ms-auto me-3">

      <i class="bi bi-sun text-white me-2"></i>

      <label class="switch">
        <input type="checkbox" [checked]="isDarkMode" (change)="toggleTheme($event)">
        <span class="slider"></span>
      </label>

      <i class="bi bi-moon text-white ms-2"></i>
    </div>

    <!-- Mobile Toggler -->
    <button
      class="navbar-toggler ms-3"
      type="button"
      (click)="isMenuOpen = !isMenuOpen"
      [attr.aria-expanded]="isMenuOpen">

      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Navbar -->
    <nav class="collapse navbar-collapse"
         [class.show]="isMenuOpen">

      <ul class="navbar-nav ms-auto">

        <li class="nav-item">
          <a class="nav-link"
             routerLink="/"
             (click)="isMenuOpen=false">
            Home
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link"
             routerLink="/services"
             (click)="isMenuOpen=false">
            Services
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link"
             routerLink="/projects"
             (click)="isMenuOpen=false">
            Projects
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link"
             routerLink="/about"
             (click)="isMenuOpen=false">
            About
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link"
             routerLink="/contact"
             (click)="isMenuOpen=false">
            Contact
          </a>
        </li>

      </ul>

    </nav>

  </div>

</header>
